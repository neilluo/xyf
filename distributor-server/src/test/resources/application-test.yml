# 测试环境配置 (H2 内存数据库)
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # H2 兼容 MySQL 模式
    baseline-on-migrate: true

  h2:
    console:
      enabled: false
