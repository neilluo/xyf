server:
  port: 8080

# Token 加密（主密钥 - 解密DB中所有敏感配置）
token:
  encrypt:
    key: ${TOKEN_ENCRYPT_KEY:}

spring:
  application:
    name: video-distributor

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:video_distributor}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Singapore&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
