server:
  port: 8080

# API Key 认证
vd:
  admin:
    api-key: ${VD_ADMIN_API_KEY:}

# Token 加密
token:
  encrypt:
    key: ${TOKEN_ENCRYPT_KEY:}

# OAuth 配置
oauth:
  youtube:
    client-id: ${YOUTUBE_CLIENT_ID:}
    client-secret: ${YOUTUBE_CLIENT_SECRET:}
    redirect-uri: ${YOUTUBE_REDIRECT_URI:http://localhost:8080/api/v1/auth/youtube/callback}
  tiktok:
    client-key: ${TIKTOK_CLIENT_KEY:}
    client-secret: ${TIKTOK_CLIENT_SECRET:}
    redirect-uri: ${TIKTOK_REDIRECT_URI:http://localhost:8080/api/v1/auth/tiktok/callback}

spring:
  application:
    name: video-distributor

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:video_distributor}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Singapore&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

# OSS配置
oss:
  endpoint: ${OSS_ENDPOINT:oss-ap-southeast-1.aliyuncs.com}
  internal-endpoint: ${OSS_INTERNAL_ENDPOINT:oss-ap-southeast-1-internal.aliyuncs.com}
  bucket: ${OSS_BUCKET:video-dist-sg}
  region: ${OSS_REGION:ap-southeast-1}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  sts-endpoint: ${OSS_STS_ENDPOINT:sts.ap-southeast-1.aliyuncs.com}
  sts-role-arn: ${OSS_STS_ROLE_ARN:}
  sts-duration-seconds: 3600
  upload-prefix: videos/

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
