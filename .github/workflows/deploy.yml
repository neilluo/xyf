name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/video-distributor

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package -DskipTests -pl distributor-server -am

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest \
            -f distributor-server/Dockerfile .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          script: |
            # Login to ghcr.io
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u neilluo --password-stdin

            # Pull latest image
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker tag ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} video-distributor:latest

            # Deploy
            cd /opt/video-distributor
            docker compose down || true
            docker compose up -d

            # Health check
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "Service is healthy!"
                exit 0
              fi
              echo "Waiting... ($i/12)"
              sleep 5
            done
            echo "Health check failed"
            docker logs video-distributor --tail 50
            exit 1
